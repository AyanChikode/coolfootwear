<div class="container">

<div class="row">

<div class="col-md-6">

<img [src]="product?.image" width="300" alt="">

</div>

<div class="col-md-6">

<h3>{{product?.title}}</h3>

<p>{{product?.description}}</p>

<h4>{{product?.price | currency:'INR'}}</h4>

<button (click)="remove()">-</button>

<span>{{qty}}</span>

<button (click)="add()">+</button>

<br><br>

<button (click)="addToCart()" class="btn btn-primary">
Add To Cart
</button>

</div>

</div>

</div>
