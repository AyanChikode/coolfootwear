<div *ngIf="product">
  <div class="container mt-4">
    <div class="row">
      
      <div class="col-md-6">
        <img 
          [src]="product.image" 
          alt="product.title" 
          class="img-fluid"
        >
      </div>

      <div class="col-md-6">
        <h2>{{ product.title }}</h2>
        <p>{{ product.description }}</p>
        <h4>₹ {{ product.price }}</h4>

        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-danger" (click)="remove()">-</button>
          <span>{{ qty }}</span>
          <button class="btn btn-success" (click)="add()">+</button>
        </div>

        <button class="btn btn-primary mt-3" (click)="addToCart()">
          Add to Cart
        </button>

      </div>

    </div>
  </div>
</div>
