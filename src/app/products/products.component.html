<h2>Products</h2>

    <div class="container">
<div class="row">

<div class="col-md-3" *ngFor="let p of products">

<a [routerLink]="['/product',p.id]">

<div class="card" style="margin:10px">

<img [src]="p.image" height="200" alt="">

<div class="card-body">

<h6>{{p.title}}</h6>

<p>{{p.price | currency:'INR'}}</p>

</div>

</div>

</a>

</div>

</div>
</div>
